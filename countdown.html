<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Countdown | TerSpegelt Hub</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;

      background-image: url("terspegelt.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* OVERLAY */
    .overlay {
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.78);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 15px;

      background: rgba(17, 24, 39, 0.75);
      backdrop-filter: blur(10px);

      position: sticky;
      top: 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.85;
      transition: 0.2s;
    }

    .navbar a:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    /* COUNTDOWN */
    .container {
      height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .title {
      font-size: 2.5rem;
      margin-bottom: 30px;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      max-width: 600px;
      width: 100%;
    }

    .box {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .number {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .label {
      opacity: 0.7;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="countdown.html">Countdown</a>
    <a href="map.html">Kaart</a>
    <a href="weather.html">Weer</a>
    <a href="pics.html">Foto’s</a>
  </div>

  <!-- COUNTDOWN -->
  <div class="container">

    <div class="title">⏳ Countdown naar TerSpegelt</div>

    <div class="grid">

      <div class="box">
        <div class="number" id="dagen">0</div>
        <div class="label">Dagen</div>
      </div>

      <div class="box">
        <div class="number" id="uren">0</div>
        <div class="label">Uren</div>
      </div>

      <div class="box">
        <div class="number" id="minuten">0</div>
        <div class="label">Minuten</div>
      </div>

      <div class="box">
        <div class="number" id="seconden">0</div>
        <div class="label">Seconden</div>
      </div>

    </div>

  </div>

</div>

<!-- JS -->
<script src="countdown.js"></script>

</body>
</html>
