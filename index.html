<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>TerSpegelt Hub</title>

  <!-- ✨ Better font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;

      background-image: url("terspegelt.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* OVERLAY */
    .overlay {
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.78);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 15px;
      flex-wrap: wrap;

      background: rgba(17, 24, 39, 0.75);
      backdrop-filter: blur(10px);

      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.85;
      transition: 0.2s;
    }

    .navbar a:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    /* HERO */
    .hero {
      min-height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3.4rem;
      margin-bottom: 10px;
      text-shadow: 0 6px 20px rgba(0, 0, 0, 0.9);
      font-weight: 700;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 25px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.8);
    }

    /* STATUS CARD */
    .status {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 15px 25px;
      border-radius: 14px;
      backdrop-filter: blur(8px);
      margin-bottom: 25px;
      font-weight: 600;
    }

    .hint {
      opacity: 0.75;
      font-size: 1rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      margin-bottom: 20px;
    }

    /* QUICK CARDS */
    .cards {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: 0.2s;
      min-width: 170px;
    }

    .card:hover {
      transform: scale(1.06);
      background: rgba(255, 255, 255, 0.14);
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html">🏠 Home</a>
    <a href="countdown.html">⏳ Countdown</a>
    <a href="map.html">🗺️ Kaart</a>
    <a href="weather.html">🌤️ Weer</a>
    <a href="pics.html">📸 Foto's</a>
    <a href="about.html">ℹ️ Over</a>
    <a href="faciliteiten.html">🏕️ Faciliteiten</a>
    <a href="openingstijden.html">🕒 Openingstijden</a>
  </div>

  <!-- HERO -->
  <div class="hero">

    <h1>🏕️ TerSpegelt Hub</h1>

    <p>Alles voor de vakantie op één plek</p>

    <div class="status">
      Nog even tot vertrek ✈️
    </div>

    <div class="hint">
      Kies een sectie hieronder
    </div>

    <div class="cards">
      <a class="card" href="countdown.html">⏳ Countdown</a>
      <a class="card" href="map.html">🗺️ Kaart</a>
      <a class="card" href="weather.html">🌤️ Weer</a>
      <a class="card" href="pics.html">📸 Foto's</a>
      <a class="card" href="about.html">ℹ️ Over</a>
      <a class="card" href="faciliteiten.html">🏕️ Faciliteiten</a>
      <a class="card" href="openingstijden.html">🕒 Openingstijden</a>
    </div>

  </div>

</div>

</body>
</html>
