<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>TerSpegelt Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;

      background-image: url("terspegelt.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* OVERLAY (stronger + cleaner) */
    .overlay {
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.75);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 15px;

      background: rgba(17, 24, 39, 0.75);
      backdrop-filter: blur(10px);

      position: sticky;
      top: 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      opacity: 0.85;
      transition: 0.2s;
    }

    .navbar a:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    /* HERO */
    .hero {
      height: calc(100vh - 70px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3.2rem;
      margin-bottom: 10px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 20px;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.8);
    }

    .hint {
      opacity: 0.75;
      font-size: 1rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>

<body>

  <div class="overlay">

    <!-- NAVBAR -->
    <div class="navbar">
      <a href="index.html">Home</a>
      <a href="countdown.html">Countdown</a>
      <a href="map.html">Kaart</a>
      <a href="weather.html">Weer</a>
      <a href="pics.html">Foto's</a>
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1>🏕️ TerSpegelt Hub</h1>
      <p>Alles voor de vakantie op één plek</p>
      <div class="hint">Kies een sectie hierboven</div>
    </div>

  </div>

</body>
</html>
