<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Weer | TerSpegelt Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;

      background-image: url("weer.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0,0,0,0.82);
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 15px;
      flex-wrap: wrap;

      background: rgba(17, 24, 39, 0.75);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.85;
      transition: 0.2s;
    }

    .navbar a:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    /* CONTAINER */
    .container {
      padding: 60px 20px;
      text-align: center;
    }

    /* TODAY CARD */
    .today-card {
      max-width: 780px;
      margin: 90px auto;
      padding: 40px;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;

      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .today-title {
      margin-bottom: 5px;
    }

    .today-subtitle {
      opacity: 0.7;
      margin-top: -5px;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .temp {
      font-size: 4.5rem;
      font-weight: 700;
      margin: 10px 0;
    }

    .weather-info {
      opacity: 0.85;
      margin-bottom: 20px;
      font-size: 1.05rem;
    }

    /* ACTIVITY BOX (FIXED READABILITY) */
    .activity-box {
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;

      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);

      line-height: 1.6;
      white-space: pre-line;
      text-align: left;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* SUBTITLE / BREAK */
    .subtitle {
      margin-top: 140px;
      opacity: 0.75;
      font-size: 1rem;
    }

    /* FORECAST */
    .forecast {
      margin-top: 50px;
      padding-bottom: 100px;

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;

      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }

    .day {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;

      padding: 14px;
      backdrop-filter: blur(10px);

      transition: 0.2s ease;
    }

    .day:hover {
      transform: scale(1.06);
      background: rgba(255,255,255,0.1);
    }

    .day div {
      margin: 4px 0;
    }

    .day-temp {
      font-weight: 600;
      margin-top: 6px;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .temp {
        font-size: 3.8rem;
      }
    }

    @media (max-width: 500px) {
      .temp {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- NAVBAR -->
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="countdown.html">Countdown</a>
    <a href="map.html">Kaart</a>
    <a href="weather.html">Weer</a>
    <a href="pics.html">Foto’s</a>
    <a href="about.html">Over</a>
    <a href="faciliteiten.html">Faciliteiten</a>
    <a href="openingstijden.html">Openingstijden</a>
  </div>

  <!-- CONTENT -->
  <div class="container">

    <!-- TODAY -->
    <div class="today-card">

      <h1 class="today-title">🌤️ Vandaag</h1>
      <div class="today-subtitle">TerSpegelt weer & activiteiten overzicht</div>

      <div class="temp" id="temp">--°C</div>

      <div class="weather-info" id="weatherInfo">
        Laden van weerdata...
      </div>

      <div class="activity-box" id="activityAdvice">
        Activiteitenadvies wordt geladen...
      </div>
    </div>

    <!-- BREAK -->
    <div class="subtitle">
      Kijk hieronder voor de komende 7 dagen 👇
    </div>

    <!-- FORECAST -->
    <div class="forecast" id="forecast"></div>

  </div>

</div>

<script src="weather.js"></script>

</body>
</html>
